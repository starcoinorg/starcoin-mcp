# Copy this file to:
#   macOS: ~/Library/Application Support/StarcoinMCP/node-cli.toml
#   Linux: ~/.config/starcoin-mcp/node-cli.toml
#
# The runtime still falls back to the legacy node-mcp.toml name when it exists, but new
# setups should use node-cli.toml.
#
# Replace the placeholder RPC URL and genesis hash with the chain you actually intend to use.
# In transaction mode, rpc_endpoint_url, mode, expected_chain_id, and expected_network are required.

# Required. Must point at the chain RPC you intend to use.
rpc_endpoint_url = "https://barnard.seed.example.org"
# Required for the transfer workflow. Optional values: "read_only", "transaction".
# If omitted, the runtime default is "read_only".
mode = "transaction"
# Optional values: "auto", "vm1_only", "vm2_only".
# The runtime distinguishes shared RPC, VM1 RPC surface, and VM2 RPC surface.
# "auto" prefers VM2 names where both VM1 and VM2 routes exist.
# Runtime default: "auto".
vm_profile = "auto"

# Required in transaction mode. Barnard example pins below.
expected_chain_id = 251
# Required in transaction mode.
expected_network = "barnard"
# Required for remote HTTPS endpoints while require_genesis_hash_match = true.
expected_genesis_hash = "0xREPLACE_WITH_REAL_GENESIS_HASH"
# Optional values: true, false. Runtime default: true.
require_genesis_hash_match = true

# Optional tuning below. These values match the current built-in defaults, so you can
# omit them unless you want to override the runtime behavior explicitly.
connect_timeout_ms = 3000
request_timeout_ms = 10000
startup_probe_timeout_ms = 10000

default_expiration_ttl_seconds = 600
max_expiration_ttl_seconds = 3600
watch_poll_interval_seconds = 3
watch_timeout_seconds = 120
max_head_lag_seconds = 60
warn_head_lag_seconds = 15
allow_submit_without_prior_simulation = true

chain_status_cache_ttl_seconds = 3
abi_cache_ttl_seconds = 300
module_cache_max_entries = 1024
disable_disk_cache = true

max_submit_blocking_timeout_seconds = 60
max_watch_timeout_seconds = 300
min_watch_poll_interval_seconds = 2
max_list_blocks_count = 100
max_events_limit = 200
max_account_resource_limit = 100
max_account_module_limit = 50
max_list_resources_size = 100
max_list_modules_size = 100
max_publish_package_bytes = 524288
max_concurrent_watch_requests = 8
max_inflight_expensive_requests = 16

# Optional. Runtime default: "info".
log_level = "info"
